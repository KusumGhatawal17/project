<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NPM Navbar</title>
    <link rel="stylesheet" href="npmstyle.css">
</head>
<body>
    <div class="token"> <span>
        ⚠️ Security Update:npm classic tokens revoked, session-based auth and CLI token management now available
    </span>
    <span>
        ❌
    </span>
</div>
<div class="line"></div>

<div class="top-nav">
    <div class="top-left">
        <span class="heart">🖤</span>
        <a href="#">Pro</a>
        <a href="#">Teams</a>
        <a href="#">Pricing</a>
        <a href="#">Documentation</a>
    </div>
</div>


<nav class="main-nav">

    <div class="l">
        npm
    </div>

    <div class="search-box">
        <input type="text" placeholder="🔍︎ Search packages">
        <button>Search</button>
    </div>

    <div class="auth-buttons">
        <button class="signup">Sign Up</button>
        <button class="signin">Sign In</button>
    </div>

</nav>

</body>
</html>
